<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with Soft Corner Radius -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />

  <!-- Feather Quill Icon -->
  <g transform="translate(100, 90) scale(1.25)" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Quill Feather Body -->
    <path d="M 200,20 C 120,40 60,100 40,190 C 70,170 120,165 150,170 C 100,200 60,240 50,280 C 130,230 180,240 210,250 C 190,200 200,100 200,20 Z" fill="rgba(255,255,255,0.25)" />
    <!-- Quill Stem Line -->
    <path d="M 200,20 Q 120,150 20,240" stroke="#ffffff" stroke-width="26" />
  </g>
</svg>
